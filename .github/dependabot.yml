version: 2
updates:
    # Tauri / Photasa Rust backend
    - package-ecosystem: "cargo"
      directory: "/apps/photasa/src-tauri"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
      open-pull-requests-limit: 5
      reviewers:
          - "systembugtj"
      assignees:
          - "systembugtj"
      commit-message:
          prefix: "deps"
          include: "scope"

    # Enable version updates for npm
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
      open-pull-requests-limit: 10
      reviewers:
          - "systembugtj"
      assignees:
          - "systembugtj"
      commit-message:
          prefix: "deps"
          include: "scope"
      allow:
          - dependency-type: "development"
          - dependency-type: "production"
      ignore:
          - dependency-name: "sharp"
            update-types: ["version-update:semver-major"]
      groups:
          vue-ecosystem:
              patterns:
                  - "vue*"
                  - "@vue/*"
                  - "vue-*"
          testing:
              patterns:
                  - "vitest*"
                  - "@vitest/*"
                  - "playwright*"
                  - "@playwright/*"
          build-tools:
              patterns:
                  - "vite*"
                  - "@vitejs/*"
                  - "typescript"
                  - "@types/*"
