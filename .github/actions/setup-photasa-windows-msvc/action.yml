name: Setup Photasa Windows MSVC (FFmpeg)
description: "MSVC dev prompt + MSYS2/NASM PATH for ffmpeg-sys-next on windows-latest"

runs:
    using: "composite"
    steps:
        # FFmpeg configure needs cl.exe with INCLUDE/LIB; without this it fails with
        # "cl.exe is unable to create an executable file".
        - name: Setup MSVC environment
          uses: ilammy/msvc-dev-cmd@v1
          with:
              arch: x64

        # FFmpeg dep tracking in ffbuild/common.mak requires GNU awk (gsub(/\\/, "/")).
        # Git for Windows ships a broken awk — install MSYS2 gawk and point $AWK at it.
        - name: Install MSYS2 build tools (FFmpeg)
          shell: pwsh
          run: |
              $bash = 'C:\msys64\usr\bin\bash.exe'
              if (-not (Test-Path $bash)) {
                  Write-Error "MSYS2 bash not found at $bash"
                  exit 1
              }
              & $bash -lc "pacman -S --noconfirm --needed make diffutils pkgconf gawk"

        - name: Verify MSYS2 gawk (FFmpeg dep awk one-liner)
          shell: pwsh
          run: |
              $gawk = 'C:\msys64\usr\bin\gawk.exe'
              if (-not (Test-Path $gawk)) {
                  Write-Error "gawk not found at $gawk"
                  exit 1
              }
              $bash = 'C:\msys64\usr\bin\bash.exe'
              & $bash -lc @"
              set -euo pipefail
              out=\$(echo 'note: including file: C:\foo\bar.h' | gawk '/including/ { sub(/^.*file: */, ""); gsub(/\\\\/, "/"); print }')
              test "\$out" = 'C:/foo/bar.h'
              "@

        # Strip Git usr/mingw64 (broken gawk for ffmpeg); append MSYS2/NASM at END so
        # MSVC link.exe stays ahead of MSYS2's link.exe (Rust msvc target requires MSVC linker).
        - name: Append MSYS2 and NASM to PATH (FFmpeg)
          shell: pwsh
          run: |
              $msys = 'C:\msys64\usr\bin'
              $nasm = 'C:\Program Files\NASM'
              $filtered = $env:PATH -split ';' | Where-Object {
                  $_ -and $_ -notmatch '[/\\]Git[/\\]usr[/\\]bin' -and $_ -notmatch '[/\\]Git[/\\]mingw64[/\\]bin'
              }
              $newPath = ($filtered + @($msys, $nasm)) -join ';'
              echo "PATH=$newPath" >> $env:GITHUB_ENV
              echo "AWK=$msys\gawk.exe" >> $env:GITHUB_ENV
              echo "MAKE=$msys\make.exe" >> $env:GITHUB_ENV
