name: Setup Photasa Windows MSVC (FFmpeg)
description: "MSVC dev prompt + MSYS2/NASM PATH for ffmpeg-sys-next on windows-latest"

runs:
    using: "composite"
    steps:
        # FFmpeg configure needs cl.exe with INCLUDE/LIB; without this it fails with
        # "cl.exe is unable to create an executable file".
        - name: Setup MSVC environment
          uses: ilammy/msvc-dev-cmd@v1
          with:
              arch: x64

        # FFmpeg configure + make need MSYS2 utilities. `shell: msys2` requires
        # msys2/setup-msys2; windows-latest only ships C:\msys64 — invoke bash directly.
        - name: Install MSYS2 build tools (FFmpeg)
          shell: pwsh
          run: |
              $bash = 'C:\msys64\usr\bin\bash.exe'
              if (-not (Test-Path $bash)) {
                  Write-Error "MSYS2 bash not found at $bash"
                  exit 1
              }
              & $bash -lc "pacman -S --noconfirm --needed make diffutils"

        # MSYS2 gawk/sh/make must win over Git\usr\bin (Git awk breaks ffmpeg make rules).
        # Keep MSVC earlier in PATH so link.exe is not shadowed by MSYS2.
        - name: Prioritize MSYS2 tools for FFmpeg build
          shell: pwsh
          run: |
              $msys = 'C:\msys64\usr\bin'
              $nasm = 'C:\Program Files\NASM'
              $filtered = $env:PATH -split ';' | Where-Object {
                  $_ -and $_ -notmatch '[/\\]Git[/\\]usr[/\\]bin' -and $_ -notmatch '[/\\]Git[/\\]mingw64[/\\]bin'
              }
              $newPath = ($msys, $nasm) + $filtered
              echo "PATH=$($newPath -join ';')" >> $env:GITHUB_ENV
