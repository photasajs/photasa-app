name: Setup Photasa Toolchain
description: "Setup Node.js, pnpm, Rust, and system compiler dependencies for Photasa"

inputs:
    checkout:
        description: "Whether to checkout the code"
        required: false
        default: "true"

runs:
    using: "composite"
    steps:
        - name: Checkout code
          if: ${{ inputs.checkout == 'true' }}
          uses: actions/checkout@v4

        - name: Install system dependencies (Linux)
          if: runner.os == 'Linux'
          run: |
              sudo apt-get update
              sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev nasm pkg-config cmake
          shell: bash

        - name: Install system dependencies (macOS)
          if: runner.os == 'macOS'
          run: |
              brew install nasm
          shell: bash

        - name: Install system dependencies (Windows)
          if: runner.os == 'Windows'
          shell: pwsh
          run: |
              choco install llvm nasm --yes --no-progress
              echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

        # FFmpeg configure needs cl.exe with INCLUDE/LIB; without this it fails with
        # "cl.exe is unable to create an executable file".
        - name: Setup MSVC environment (Windows)
          if: runner.os == 'Windows'
          uses: ilammy/setup-msvc-dev@v1
          with:
              arch: x64

        # Append MSYS2 after MSVC so MSYS2 link.exe does not shadow MSVC linker.
        # sh/make/perl are required by ffmpeg-sys-next configure on Windows.
        - name: Append MSYS2 and NASM to PATH (Windows)
          if: runner.os == 'Windows'
          shell: pwsh
          run: echo "PATH=$env:PATH;C:\msys64\usr\bin;C:\Program Files\NASM" >> $env:GITHUB_ENV

        - name: Install Rust toolchain
          uses: dtolnay/rust-toolchain@master
          with:
              toolchain: 1.94.0
              components: clippy, rustfmt

        - name: Rust Cache
          uses: Swatinem/rust-cache@v2
          with:
              workspaces: ". -> target"

        - name: Setup pnpm
          uses: pnpm/action-setup@v3
          with:
              version: 9.0.0

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
              node-version: 20
              cache: "pnpm"

        - name: Install Node dependencies
          run: pnpm install --frozen-lockfile
          shell: bash
