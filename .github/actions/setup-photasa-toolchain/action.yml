name: Setup Photasa Toolchain
description: 'Setup Node.js, pnpm, Rust, and system compiler dependencies for Photasa'

inputs:
  checkout:
    description: 'Whether to checkout the code'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Checkout code
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev nasm
      shell: bash

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install nasm
      shell: bash

    - name: Install system dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install nasm
      shell: pwsh

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: 1.94.0
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "apps/photasa/src-tauri -> target"

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9.0.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'

    - name: Install Node dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
