# Builds Tauri bundles per OS and uploads to an existing GitHub Release.
# Invoked by release.yml via workflow_call when release-please creates a release,
# or manually via workflow_dispatch to retry a specific tag.
# See RFC 0155 and docs/design/20250704-release-please-upload-best-practice.md

name: Upload Release Assets

on:
    workflow_call:
        inputs:
            tag_name:
                description: "Git tag for the GitHub Release (from release-please tag_name output)"
                required: true
                type: string
            release_sha:
                description: "Commit SHA release-please tagged (from release-please sha output)"
                required: true
                type: string
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Git tag to build and upload (e.g. photasa-v2.0.0 or v2.0.0)"
                required: true
                type: string
            release_sha:
                description: "Optional commit SHA; when empty, resolved from the tag ref"
                required: false
                type: string

# Flip to "true" to publish Windows release assets again.
env:
    PHOTASA_CI_WINDOWS_ENABLED: "false"

permissions:
    contents: write
    actions: read

jobs:
    resolve:
        name: Resolve release coordinates
        runs-on: ubuntu-latest
        outputs:
            tag_name: ${{ steps.coords.outputs.tag_name }}
            release_sha: ${{ steps.coords.outputs.release_sha }}
            matrix: ${{ steps.platforms.outputs.matrix }}
        steps:
            - name: Checkout tag (manual dispatch without SHA)
              if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_sha == '' }}
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.tag_name }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Resolve tag and commit
              id: coords
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${{ github.event_name }}" = "workflow_call" ]; then
                    tag_name="${{ inputs.tag_name }}"
                    release_sha="${{ inputs.release_sha }}"
                  else
                    tag_name="${{ github.event.inputs.tag_name }}"
                    release_sha="${{ github.event.inputs.release_sha }}"
                    if [ -z "$release_sha" ]; then
                      release_sha="$(git rev-parse HEAD)"
                    fi
                  fi
                  if [ -z "$tag_name" ] || [ -z "$release_sha" ]; then
                    echo "::error::tag_name and release_sha are required."
                    exit 1
                  fi
                  echo "Publishing assets for tag=$tag_name sha=$release_sha"
                  echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
                  echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

            - name: Verify signing key secret presence
              shell: bash
              run: |
                  if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
                    echo "::error::TAURI_SIGNING_PRIVATE_KEY is missing in repository secrets. Fail-fast to prevent unsigned releases."
                    exit 1
                  fi

            - name: Resolve matrix OS list
              id: platforms
              shell: bash
              run: |
                  set -euo pipefail
                  platforms='["ubuntu-latest","macos-latest"]'
                  if [ "${{ env.PHOTASA_CI_WINDOWS_ENABLED }}" = "true" ]; then
                    platforms='["ubuntu-latest","macos-latest","windows-latest"]'
                  fi
                  echo "matrix=$platforms" >> "$GITHUB_OUTPUT"

    build-and-upload:
        needs: resolve
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: ${{ fromJSON(needs.resolve.outputs.matrix) }}

        steps:
            - name: Checkout release commit
              uses: actions/checkout@v4
              with:
                  ref: ${{ needs.resolve.outputs.release_sha }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup Toolchain
              uses: ./.github/actions/setup-photasa-toolchain
              with:
                  checkout: "false"

            - name: Setup Windows MSVC (FFmpeg)
              if: runner.os == 'Windows'
              uses: ./.github/actions/setup-photasa-windows-msvc

            - name: Build & Publish Tauri Release Assets
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  projectPath: apps/photasa
                  tagName: ${{ needs.resolve.outputs.tag_name }}
                  releaseCommitish: ${{ needs.resolve.outputs.release_sha }}

    # RFC 0155: verify once after all platform legs finish (not per-matrix — avoids races).
    verify-updater-artifact:
        needs: [resolve, build-and-upload]
        if: ${{ needs.build-and-upload.result == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: Verify updater artifact was published
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  tag="${{ needs.resolve.outputs.tag_name }}"
                  if ! gh release view "$tag" --repo "${{ github.repository }}" --json assets \
                      --jq '.assets[].name' | grep -qx "latest.json"; then
                    echo "::error::latest.json missing from release $tag — createUpdaterArtifacts may be disabled or signing failed. Updater will be unreachable."
                    exit 1
                  fi
                  echo "latest.json present on release $tag."
