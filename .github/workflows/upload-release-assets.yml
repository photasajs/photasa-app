# Triggered after release-please finishes on main. Builds Tauri bundles per OS and
# uploads them to the GitHub Release when the latest v* tag points at that commit.
# See docs/design/20250704-release-please-upload-best-practice.md

name: Upload Release Assets

on:
    workflow_run:
        workflows: ["Release Please"]
        types:
            - completed

permissions:
    contents: write
    actions: read

jobs:
    build-and-upload:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      bundle_globs: |
                          apps/photasa/src-tauri/target/release/bundle/**/*.deb
                          apps/photasa/src-tauri/target/release/bundle/**/*.AppImage
                    - os: macos-latest
                      bundle_globs: |
                          apps/photasa/src-tauri/target/release/bundle/macos/**/*.app
                    - os: windows-latest
                      bundle_globs: |
                          apps/photasa/src-tauri/target/release/bundle/**/*.msi
                          apps/photasa/src-tauri/target/release/bundle/**/*.exe

        steps:
            - name: Checkout release commit
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
                  fetch-depth: 0

            - name: Detect new release tag on main
              id: release
              shell: bash
              run: |
                  set -euo pipefail
                  release_sha="${{ github.event.workflow_run.head_sha }}"
                  latest_tag="$(git tag -l "v*" --sort=-version:refname | head -n 1 || true)"
                  if [ -z "$latest_tag" ]; then
                    echo "No v* tags found; skipping asset upload."
                    echo "should_upload=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  tag_sha="$(git rev-list -n 1 "$latest_tag")"
                  echo "Latest tag: $latest_tag -> $tag_sha"
                  echo "Release commit: $release_sha"
                  if [ "$tag_sha" != "$release_sha" ]; then
                    echo "Tag does not point at this commit; skipping asset upload."
                    echo "should_upload=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  echo "should_upload=true" >> "$GITHUB_OUTPUT"
                  echo "tag_name=$latest_tag" >> "$GITHUB_OUTPUT"

            - name: Setup Toolchain
              if: steps.release.outputs.should_upload == 'true'
              uses: ./.github/actions/setup-photasa-toolchain
              with:
                  checkout: "false"

            - name: Build Tauri app (release)
              if: steps.release.outputs.should_upload == 'true'
              run: pnpm --filter @photasa/photasa tauri build

            - name: Upload Release Assets
              if: steps.release.outputs.should_upload == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.release.outputs.tag_name }}
                  files: ${{ matrix.bundle_globs }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
