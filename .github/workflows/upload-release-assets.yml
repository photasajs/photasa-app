# Triggered after release-please finishes on main. Builds Tauri bundles per OS and
# uploads them to the GitHub Release when the latest v* tag points at that commit.
# See docs/design/20250704-release-please-upload-best-practice.md

name: Upload Release Assets

on:
    workflow_run:
        workflows: ["Release Please"]
        types:
            - completed

# Flip to "true" to publish Windows release assets again.
env:
    PHOTASA_CI_WINDOWS_ENABLED: "false"

permissions:
    contents: write
    actions: read

jobs:
    platforms:
        name: Resolve release platforms
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.resolve.outputs.matrix }}
        steps:
            - name: Resolve matrix OS list
              id: resolve
              shell: bash
              run: |
                  set -euo pipefail
                  platforms='["ubuntu-latest","macos-latest"]'
                  if [ "${{ env.PHOTASA_CI_WINDOWS_ENABLED }}" = "true" ]; then
                    platforms='["ubuntu-latest","macos-latest","windows-latest"]'
                  fi
                  echo "matrix=$platforms" >> "$GITHUB_OUTPUT"

    build-and-upload:
        needs: platforms
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                # tauri-action manages its own build outputs & upload per OS;
                # this matrix only selects the runner (no per-OS glob config needed).
                os: ${{ fromJSON(needs.platforms.outputs.matrix) }}

        steps:
            - name: Checkout release commit
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
                  fetch-depth: 0

            - name: Detect new release tag on main
              id: release
              shell: bash
              run: |
                  set -euo pipefail
                  release_sha="${{ github.event.workflow_run.head_sha }}"
                  latest_tag="$(git tag -l "v*" --sort=-version:refname | head -n 1 || true)"
                  if [ -z "$latest_tag" ]; then
                    echo "No v* tags found; skipping asset upload."
                    echo "should_upload=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  tag_sha="$(git rev-list -n 1 "$latest_tag")"
                  echo "Latest tag: $latest_tag -> $tag_sha"
                  echo "Release commit: $release_sha"
                  if [ "$tag_sha" != "$release_sha" ]; then
                    echo "Tag does not point at this commit; skipping asset upload."
                    echo "should_upload=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  echo "should_upload=true" >> "$GITHUB_OUTPUT"
                  echo "tag_name=$latest_tag" >> "$GITHUB_OUTPUT"

            - name: Verify signing key secret presence
              if: steps.release.outputs.should_upload == 'true'
              shell: bash
              run: |
                  if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
                    echo "::error::TAURI_SIGNING_PRIVATE_KEY is missing in repository secrets. Fail-fast to prevent unsigned releases."
                    exit 1
                  fi

            - name: Setup Toolchain
              if: steps.release.outputs.should_upload == 'true'
              uses: ./.github/actions/setup-photasa-toolchain
              with:
                  checkout: "false"

            - name: Setup Windows MSVC (FFmpeg)
              if: steps.release.outputs.should_upload == 'true' && runner.os == 'Windows'
              uses: ./.github/actions/setup-photasa-windows-msvc

            - name: Build & Publish Tauri Release Assets
              if: steps.release.outputs.should_upload == 'true'
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  projectPath: apps/photasa
                  tagName: ${{ steps.release.outputs.tag_name }}
                  releaseName: "Photasa ${{ steps.release.outputs.tag_name }}"
                  releaseBody: "See release notes on GitHub."
                  releaseId: ${{ steps.release.outputs.tag_name }}

            # RFC 0155 Acceptance 4/8: createUpdaterArtifacts silently no-ops if unset —
            # this turns "workflow green" into "updater artifact actually exists".
            - name: Verify updater artifact was published
              if: steps.release.outputs.should_upload == 'true'
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  tag="${{ steps.release.outputs.tag_name }}"
                  if ! gh release view "$tag" --repo "${{ github.repository }}" --json assets \
                      --jq '.assets[].name' | grep -qx "latest.json"; then
                    echo "::error::latest.json missing from release $tag — createUpdaterArtifacts may be disabled or signing failed. Updater will be unreachable."
                    exit 1
                  fi
                  echo "latest.json present on release $tag."
