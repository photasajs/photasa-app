# 说明：
# 本 workflow 采用 on: workflow_run 触发，解决 release-please 创建 Release 时 on: release 不会被激活的问题。
# 仅当 main 分支最新 commit 与最新 tag 指向同一 commit 时才继续上传产物，确保只在 Release PR 合并后处理。
# 详见：https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_run
# 注意：workflows 名称需与 release-please workflow 的 name 字段完全一致。

name: Upload Release Assets

on:
    workflow_run:
        workflows: ["Release Please"]
        types:
            - completed

jobs:
    build-and-upload:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                build_script: [build:linux, build:mac, build:win]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check if latest tag matches main commit
              id: check_release
              run: |
                  git fetch --tags origin main
                  latest_tag=$(git describe --tags --abbrev=0 origin/main)
                  tag_commit=$(git rev-list -n 1 $latest_tag)
                  main_commit=$(git rev-parse origin/main)
                  echo "Latest tag: $latest_tag -> $tag_commit"
                  echo "Main commit: $main_commit"
                  if [ "$tag_commit" != "$main_commit" ]; then
                    echo "No new release/tag for this commit, skipping upload."
                    exit 0
                  fi
                  echo "New release/tag detected: $latest_tag"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm install

            - name: Build app
              run: npm run ${{ matrix.build_script }}

            - name: Upload Release Asset
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/**
                      out/**
                      release/**
                      build/**
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
