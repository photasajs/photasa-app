name: Photasa PR Build Matrix

on:
    pull_request:
        branches: [main, develop]
    push:
        branches: [develop]
    workflow_dispatch:

# Flip to "true" to re-enable Windows matrix legs (FFmpeg/libheif native stack).
env:
    PHOTASA_CI_WINDOWS_ENABLED: "false"

jobs:
    check:
        name: Lint & Test (Ubuntu)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Toolchain
              uses: ./.github/actions/setup-photasa-toolchain
              with:
                  checkout: "false"

            - name: Run ESLint
              run: pnpm --filter @photasa/photasa run lint

            - name: Run TypeScript Typecheck
              run: pnpm --filter @photasa/photasa run typecheck

            - name: Run Frontend Unit Tests
              run: pnpm --filter @photasa/photasa run test:unit

            - name: Guard prod CI from dev build channel (RFC 0157)
              run: bash scripts/ci/guard-prod-build-channel.sh

            - name: Run Rust Clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

            - name: Run Rust Unit Tests
              run: cargo test --workspace

    platforms:
        name: Resolve build platforms
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.resolve.outputs.matrix }}
        steps:
            - name: Resolve matrix OS list
              id: resolve
              shell: bash
              run: |
                  set -euo pipefail
                  platforms='["ubuntu-latest","macos-latest"]'
                  if [ "${{ env.PHOTASA_CI_WINDOWS_ENABLED }}" = "true" ]; then
                    platforms='["ubuntu-latest","macos-latest","windows-latest"]'
                  fi
                  echo "matrix=$platforms" >> "$GITHUB_OUTPUT"

    build:
        name: Build (${{ matrix.os }})
        needs: [check, platforms]
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: ${{ fromJSON(needs.platforms.outputs.matrix) }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Toolchain
              uses: ./.github/actions/setup-photasa-toolchain
              with:
                  checkout: "false"

            # Workflow-level if skips action download on Linux/macOS (composite inner if does not).
            - name: Setup Windows MSVC (FFmpeg)
              if: runner.os == 'Windows'
              uses: ./.github/actions/setup-photasa-windows-msvc

            - name: Build Tauri App (Debug Profile)
              # PR/matrix CI has no signing secret; keep pubkey in config for release only.
              run: pnpm --filter @photasa/photasa run build:ci
