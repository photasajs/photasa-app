# NOTE: `name:` below is a cross-file contract. upload-release-assets.yml listens
# for this exact workflow name via `workflow_run: workflows: ["Release Please"]`.
# Renaming this workflow silently breaks that listener (no error, it just stops firing).
# See RFC 0155.
name: Release Please

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write
    issues: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        steps:
            - name: Release Please
              uses: googleapis/release-please-action@v4
              with:
                  release-type: node
