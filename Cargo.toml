[workspace]
resolver = "2"
members = [
    "crates/zouwu-core",
    "crates/zouwu-builtin",
    "crates/libheif-sys",
    "crates/wenchang-preferences",
    "apps/photasa/src-tauri",
]

[patch.crates-io]
libheif-sys = { path = "crates/libheif-sys" }

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
thiserror = "1"
pest = "2"
pest_derive = "2"
zouwu-core = { path = "crates/zouwu-core" }
zouwu-builtin = { path = "crates/zouwu-builtin" }
wenchang-preferences = { path = "crates/wenchang-preferences" }
