<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <title>Photasa</title>
        <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
        <!-- Tauri 本地图：asset 协议（convertFileSrc），非 file:// -->

        />
    </head>

    <body>
        <div id="app" data-theme></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
