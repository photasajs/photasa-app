<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Photasa</title>
        <style>
            :root {
                color-scheme: light dark;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                height: 100%;
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                background: #1a1d23;
                color: #e8eaed;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .wrap {
                text-align: center;
                padding: 1.5rem;
            }
            h1 {
                margin: 0 0 0.75rem;
                font-size: 1.35rem;
                font-weight: 600;
                letter-spacing: 0.04em;
            }
            p {
                margin: 0;
                font-size: 0.85rem;
                opacity: 0.72;
            }
            .spinner {
                width: 36px;
                height: 36px;
                margin: 1rem auto 0;
                border: 3px solid rgba(255, 255, 255, 0.12);
                border-top-color: #6b9fff;
                border-radius: 50%;
                animation: spin 0.85s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <h1>Photasa</h1>
            <p>正在载入…</p>
            <div class="spinner" aria-hidden="true"></div>
        </div>
    </body>
</html>
