id: "folder_scan"
name: "文件夹扫描工作流"
description: "扫描指定文件夹并生成缩略图"
version: "1.0.0"
author: "Tianshu Engine"
createdAt: 1703123456789
updatedAt: 1703123456789

# 输入参数定义
inputSchema:
  type: "object"
  properties:
    folderPath:
      type: "string"
      description: "要扫描的文件夹路径"
    recursive:
      type: "boolean"
      description: "是否递归扫描子文件夹"
      default: true
    generateThumbnails:
      type: "boolean"
      description: "是否生成缩略图"
      default: true

# 输出参数定义
outputSchema:
  type: "object"
  properties:
    scannedFiles:
      type: "number"
      description: "扫描的文件数量"
    generatedThumbnails:
      type: "number"
      description: "生成的缩略图数量"
    duration:
      type: "number"
      description: "扫描耗时（毫秒）"

# 工作流步骤
steps:
  - id: "validate_input"
    name: "验证输入参数"
    type: "action"
    description: "验证输入参数的有效性"
    service: "sibu"
    action: "validatePath"
    input:
      path: "${input.folderPath}"
    output:
      isValid: "validation.isValid"
      error: "validation.error"

  - id: "check_condition"
    name: "检查验证结果"
    type: "condition"
    condition:
      field: "step.validate_input.output.isValid"
      operator: "eq"
      value: true
    dependsOn: ["validate_input"]

  - id: "scan_folder"
    name: "扫描文件夹"
    type: "action"
    description: "扫描文件夹中的文件"
    service: "qianliyan"
    action: "scanFolder"
    input:
      folderPath: "${input.folderPath}"
      recursive: "${input.recursive}"
    output:
      files: "scanResult.files"
      count: "scanResult.count"
    dependsOn: ["check_condition"]

  - id: "generate_thumbnails"
    name: "生成缩略图"
    type: "action"
    description: "为扫描到的文件生成缩略图"
    service: "maliang"
    action: "generateThumbnails"
    input:
      files: "${step.scan_folder.output.files}"
      options:
        size: 200
        quality: 90
    output:
      thumbnails: "thumbnailResult.thumbnails"
      count: "thumbnailResult.count"
    dependsOn: ["scan_folder"]
    ignoreError: true

  - id: "update_database"
    name: "更新数据库"
    type: "action"
    description: "将扫描结果保存到数据库"
    service: "sibu"
    action: "updateManifest"
    input:
      folderPath: "${input.folderPath}"
      files: "${step.scan_folder.output.files}"
      thumbnails: "${step.generate_thumbnails.output.thumbnails}"
    output:
      success: "dbResult.success"
    dependsOn: ["scan_folder", "generate_thumbnails"]

# 工作流配置
enabled: true
timeout: 300000  # 5分钟超时
tags: ["scan", "folder", "thumbnail"]
