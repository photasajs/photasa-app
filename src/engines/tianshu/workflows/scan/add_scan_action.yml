# 添加扫描任务工作流
# RFC 0042 Phase 2.4: 天界处理单个扫描任务添加

version: "1.0"
id: "add_scan_action"
name: "添加扫描任务"
description: "接收单个ScanAction，恢复队列，添加，持久化，返回完整队列"

inputs:
    action:
        type: "object"
        required: true
        description: "要添加的单个ScanAction对象 {path, action, source, addedAt}"

steps:
    - id: "restore_queue"
      name: "千里眼：恢复当前队列"
      type: "action"
      service: "taiyi"
      action: "callEngine"
      input:
          engineName: "qianliyan"
          methodName: "restoreQueue"
      # ✅ 太乙服务的数据扁平化策略：
      # engine.callEngine() 返回 { success: true, result: ScanAction[], ... }
      # engine.getEngineResult() 提取 result 字段
      # 因此 steps.restore_queue 直接就是 ScanAction[]，无需 .result 嵌套
      output_schema:
          type: array
          items:
              type: object
              properties:
                  path:
                      type: string
                  action:
                      type: string
                  source:
                      type: string
                  addedAt:
                      type: number

    - id: "append_action"
      name: "添加新任务到队列"
      type: "builtin"
      action: "transform"
      input:
          type: "append"
          array: "{{steps.restore_queue}}"
          item: "{{inputs.action}}"
      output_schema:
          type: array
          description: "添加新任务后的完整队列"
      dependsOn: ["restore_queue"]

    - id: "persist_queue"
      name: "千里眼：持久化队列"
      type: "action"
      service: "taiyi"
      action: "callEngine"
      input:
          engineName: "qianliyan"
          methodName: "persistQueue"
          params:
              - "{{steps.append_action}}"
      output_schema:
          type: object
          properties:
              success:
                  type: boolean
              timestamp:
                  type: number
      dependsOn: ["append_action"]

    - id: "format_response"
      name: "返回完整队列"
      type: "builtin"
      action: "return"
      input:
          success: true
          queue: "{{steps.append_action}}"
          queueSize: "{{steps.append_action.length}}"
          persisted: true
      dependsOn: ["persist_queue"]

outputs:
    queue:
        description: "完整的扫描队列（用于Store同步）"
        type: "array"
        path: "queue"
    queueSize:
        description: "队列大小"
        type: "number"
        path: "queueSize"
    persisted:
        description: "是否已持久化"
        type: "boolean"
        path: "persisted"
