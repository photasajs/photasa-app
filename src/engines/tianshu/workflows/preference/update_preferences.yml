# 更新用户偏好设置工作流
# 通过文昌引擎更新偏好设置并广播变更

id: "update_preferences"
name: "更新用户偏好设置"
description: "更新用户偏好设置"
version: "1.0.0"
author: "Tianshu Engine"
createdAt: 1727544000000
updatedAt: 1727544000000

# 触发条件
triggers:
  - intent: "update_preferences"
  - intent: "preference_update"

# 输入参数
inputs:
  delta:
    type: "object"
    required: true
    description: "要更新的偏好设置增量对象"
  source:
    type: "string"
    required: false
    default: "user_action"
    description: "更新来源标识"

# 工作流步骤
steps:
  - id: "validate_delta"
    name: "验证偏好更新数据"
    type: "action"
    description: "验证偏好更新数据"
    service: "wenchang"
    action: "validate"
    input:
      delta: "{{inputs.delta}}"
      rules:
        - type: "object"
        - notEmpty: true
        - allowedKeys: ["ui", "display", "scan", "performance", "advanced"]
    output:
      result: "result"
      success: "success"
    # 声明适配器返回结构，使工作流自解释
    output_schema:
      result:
        valid: boolean
        errors: string[]
      success: boolean
      timestamp: number
      engineName: string

  - id: "simple_test"
    name: "简单测试步骤"
    type: "builtin"
    action: "log"
    input:
      level: "info"
      message: "🎯 简单测试步骤执行了！"
    dependsOn: ["validate_delta"]

  - id: "check_validation"
    name: "check_validation"
    type: "condition"
    description: "根据验证结果决定是否继续执行"
    dependsOn: ["simple_test"]
    condition:
      field: "steps.validate_delta.output.result.valid"
      operator: "eq"
      value: true
    onTrue: []  # 验证通过，继续执行后续步骤
    onFalse:
      - id: "return_validation_error"
        name: "return_validation_error"
        type: "builtin"
        action: "return"
        input:
          success: false
          error: "偏好设置数据验证失败"
          details: "{{steps.validate_delta.output.result.errors}}"

  - id: "sanitize_values"
    name: "清理和验证偏好值"
    type: "action"
    description: "清理和验证偏好值"
    service: "wenchang"
    action: "sanitize"
    input:
      source: "{{inputs.delta}}"
      rules:
        ui.theme:
          type: "string"
          minLength: 1
          default: "solarized-dark"
        ui.language:
          type: "string"
          pattern: "^[a-z]{2}-[A-Z]{2}$"
          default: "zh-CN"
        display.thumbnailSize:
          type: "number"
          min: 50
          max: 500
          default: 150
        display.viewMode:
          type: "enum"
          values: ["grid", "list", "timeline"]
          default: "grid"
    output:
      result: "result"
      success: "success"
    # 声明适配器返回结构，使工作流自解释
    output_schema:
      result:
        result: object
      success: boolean
      timestamp: number
      engineName: string
    dependsOn: ["check_validation"]

  - id: "update_engine"
    name: "调用文昌引擎更新偏好"
    type: "action"
    description: "调用文昌引擎更新偏好"
    service: "wenchang"
    action: "updatePreferences"
    input:
      delta: "{{steps.sanitize_values.output.result.result}}"
      source: "{{inputs.source}}"
    output:
      result: "result"
    dependsOn: ["sanitize_values"]

  - id: "get_updated_snapshot"
    name: "获取更新后的偏好快照"
    type: "action"
    description: "获取更新后的偏好快照"
    service: "wenchang"
    action: "getCurrentSnapshot"
    input: {}
    output:
      result: "result"
    # 声明适配器返回结构，使工作流自解释
    output_schema:
      result:
        data: object
      success: boolean
      timestamp: number
      engineName: string
    dependsOn: ["update_engine"]

  - id: "emit_change_event"
    name: "发送偏好变更事件"
    type: "action"
    description: "发送偏好变更事件"
    service: "wenchang"
    action: "emitEvent"
    input:
      event: "preferences_changed"
      data:
        delta: "{{steps.sanitize_values.output.result.result}}"
        snapshot: "{{steps.get_updated_snapshot.output.result.data}}"
        source: "{{inputs.source}}"
        timestamp: "{{now()}}"
    output:
      eventId: "result.eventId"
    dependsOn: ["get_updated_snapshot"]

  - id: "format_response"
    name: "格式化返回结果"
    type: "action"
    description: "格式化返回结果"
    service: "wenchang"
    action: "formatResponse"
    input:
      success: true
      data:
        updated: "{{steps.sanitize_values.output.result.result}}"
        snapshot: "{{steps.get_updated_snapshot.output.result.data}}"
      timestamp: "{{now()}}"
      source: "wenchang_engine"
    output:
      response: "result"
    dependsOn: ["emit_change_event"]

# 输出定义
outputs:
  success:
    description: "更新是否成功"
    type: "boolean"
  updated:
    description: "实际更新的偏好项"
    type: "object"
  snapshot:
    description: "更新后的完整偏好快照"
    type: "object"

# 错误处理
error_handling:
  validation_error:
    type: "return_error"
    response:
      success: false
      error: "偏好设置数据验证失败"
      details: "{{ error.details }}"

  engine_error:
    type: "return_error"
    response:
      success: false
      error: "文昌引擎更新失败"
      reason: "{{ error.message }}"

# 超时设置
timeout: 10000
priority: "user"
