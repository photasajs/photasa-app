# 获取用户偏好设置工作流
# 通过文昌引擎获取当前的偏好快照

id: "get_preferences"
name: "获取用户偏好设置"
description: "获取当前用户偏好设置"
version: "1.0.0"
author: "Tianshu Engine"
createdAt: 1727544000000
updatedAt: 1727544000000

# 触发条件
triggers:
  - intent: "get_preferences"
  - intent: "preference_get"

# 输入参数
inputs:
  key:
    type: "string"
    required: false
    description: "可选的偏好键路径，如'ui.theme'，为空则返回全部"

# 工作流步骤
steps:
  - id: "validate_input"
    name: "验证输入参数"
    type: "condition"
    description: "验证输入参数"
    condition:
      field: "inputs.key"
      operator: "optional_string_maxlen"
      value: 100

  - id: "get_snapshot"
    name: "获取偏好快照"
    type: "action"
    description: "从文昌引擎获取偏好快照"
    service: "wenchang"
    action: "getCurrentSnapshot"
    input: {}
    onError:
      type: "return_error"
      message: "获取偏好设置失败"

  - id: "process_extraction"
    name: "处理提取操作"
    type: "builtin"
    description: "提取特定键值"
    action: "setVariable"
    input:
      variable: "extracted_value"
      source: "steps.get_snapshot.result"
      path: "{{ inputs.key }}"
    condition:
      field: "inputs.key"
      operator: "exists"
    dependsOn: ["get_snapshot"]

  - id: "format_response"
    name: "格式化响应结果"
    type: "builtin"
    description: "格式化返回结果"
    action: "return"
    input:
      success: true
      data: "{{ steps.get_snapshot.result }}"
      timestamp: "{{ $timestamp }}"
      source: "wenchang_engine"

# 输出定义
outputs:
  preferences:
    description: "偏好设置数据"
    type: "object"
  success:
    description: "操作是否成功"
    type: "boolean"

# 错误处理
error_handling:
  default:
    type: "graceful_failure"
    response:
      success: false
      error: "获取偏好设置时发生错误"
      data: null

# 超时设置
timeout: 5000
priority: "user"