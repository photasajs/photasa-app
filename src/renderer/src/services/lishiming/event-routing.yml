# 李世民事件路由配置
# 定义如何处理启奏事件（mitt qizou）

metadata:
  version: "1.0.0"
  description: "李世民中央事件路由配置 - qizou-shengzhi架构"
  lastUpdated: "2025-10-16"
  rfc: "RFC 0038 Phase 7"

# 启奏路由规则（mitt.on('qizou')）
# 李世民只处理跨部门协调事务，不处理部门内部常规工作
qizou_routes:
  # 褚遂良报告路径添加完成 → 李世民协调尉迟恭开始扫描
  add_path_completed:
    - when:
        from: "褚遂良"
        type: "report"
      then:
        service: "尉迟恭"
        shengzhi:
          command: "add_scan_task"
          content:
            path: "{{qizou.content.path}}"
          priority: "normal"
        description: "路径添加完成后，下旨尉迟恭添加扫描任务"

  # 褚遂良报告路径移除完成 → 李世民协调尉迟恭移除扫描任务
  remove_path_completed:
    - when:
        from: "褚遂良"
        type: "report"
      then:
        service: "尉迟恭"
        shengzhi:
          command: "remove_scan_task"
          content:
            path: "{{qizou.content.path}}"
          priority: "normal"
        description: "路径移除完成后，下旨尉迟恭移除扫描任务"
